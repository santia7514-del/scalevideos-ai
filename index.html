<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ScaleVideos AI</title>
</head>

<body style="background:#0d1117;color:white;text-align:center;padding:40px;font-family:Arial;">

<h1>🚀 ScaleVideos AI</h1>

<input placeholder="Nome do produto" id="produto"><br><br>

<button onclick="gerar()">GERAR 4 VÍDEOS</button>

<div id="res"></div>

<script>
function gerar() {
  let p = document.getElementById("produto").value;
  let html = "";

  let tipos = ["Gancho","Dor","Demonstração","Comparação"];

  tipos.forEach((t,i)=>{
    html += "<p>Vídeo "+(i+1)+" - "+t+" sobre "+p+"</p>";
  });

  document.getElementById("res").innerHTML = html;
}
</script>

</body>
</html>
